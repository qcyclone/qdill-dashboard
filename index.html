<!doctype html>
<html lang="zh-CN">
<head>

  <title>纳指基金监控看板</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>纳指基金监控看板</h1>

    <section id="board"></section>
  </main>
  <script src="./script.js"></script>
